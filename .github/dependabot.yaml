version: 2
updates:
  - directory: /
    package-ecosystem: pip
    schedule:
      interval: quarterly
      timezone: America/Mexico_City
    assignees:
      - "edgarrmondragon"
    reviewers:
      - "edgarrmondragon"
    commit-message:
      prefix: "chore(deps): "
      prefix-development: "chore(deps-dev): "
    versioning-strategy: increase-if-necessary
    cooldown:
      default-days: 7
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: quarterly
      timezone: America/Mexico_City
    assignees:
      - "edgarrmondragon"
    reviewers:
      - "edgarrmondragon"
    commit-message:
      prefix: "ci: "
    groups:
      actions:
        patterns:
          - "*"
    cooldown:
      default-days: 7
